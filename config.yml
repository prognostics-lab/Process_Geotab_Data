# Geotab Data Processing Configuration

# Input paths
raw_data_path: "raw_data"
files:
  motor_status: "Reporte avanzado de estado de motor_20260310_083423.xlsx"
  data_log: "Reporte por defecto de registro de datos y colisiones_20260310_082439.xlsx"

# Time window filter (only process data within this range)
time_window:
  start: "2026-03-06 08:26:44.394"
  end: "2026-03-06 10:21:37.000"

# Maximum distance (meters) between consecutive GPS points.
# Intermediate points are interpolated when the gap exceeds this value.
densify_max_gap_meters: 5

# Output paths
processed_data_path: "processed_data"
output_files:
  vars: "vars.csv"
  gps: "gps.csv"
  route_vars: "route_vars.csv"

# Feature extraction settings
features:
  segment_length_meters: 100
  wwo_api_key: "67a922066b844919a0a191058252705"
  output_file: "features.csv"

# Route selection settings
route:
  interval_meters: 5
  output_file: "route_coords.csv"
